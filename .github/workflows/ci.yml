name: CI

on:
  pull_request:
    branches: [main]

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  # Pure-Go (no CGO), so every target cross-compiles from one host. This
  # gate keeps the Unix/Windows build-tag seams (proc_*, ps_*,
  # shellquote_*) honest on every PR.
  cross-compile:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build all targets
        run: |
          for target in darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 linux/amd64; do
            echo "==> $target"
            GOOS=${target%/*} GOARCH=${target#*/} go build ./...
          done
