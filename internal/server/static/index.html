<style>/* Mission Control for flow — Facets-native dark UI */
:root {
  --bg: #0c0c0c;
  --bg-2: #111111;
  --surface: #141417;
  --surface-2: #1a1a1f;
  --surface-3: #22222a;
  --border: #26262e;
  --border-strong: #34343e;
  --text: #e7e7ea;
  --text-mid: #b5b5bd;
  --text-dim: #888892;
  --text-faint: #5a5a64;
  --primary: #645df6;
  --primary-hi: #8b87f8;
  --primary-dim: rgba(100, 93, 246, 0.14);
  --accent: #5eead4;
  --accent-dim: rgba(94, 234, 212, 0.12);
  --running: #2eb672;
  --running-dim: rgba(46, 182, 114, 0.14);
  --waiting: #f5a623;
  --waiting-dim: rgba(245, 166, 35, 0.14);
  --idle: #8a8a98;
  --idle-dim: rgba(138, 138, 152, 0.1);
  --stale: #c98a3f;
  --stale-dim: rgba(201, 138, 63, 0.12);
  --error: #e25757;
  --error-dim: rgba(226, 87, 87, 0.14);
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  --sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; }
html, body, #root { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13.5px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body {
  background:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px),
    var(--bg);
  background-size: 28px 28px;
}
button { font-family: inherit; }
button:focus-visible, input:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

.mono { font-family: var(--mono); font-feature-settings: 'liga' 0; }
.dim { color: var(--text-dim); }
code { font-family: var(--mono); background: var(--surface-2); padding: 1px 5px; border-radius: 3px; font-size: 0.92em; }
.flow-logo { display: inline-flex; align-items: center; gap: 10px; min-width: 0; color: var(--text); }
.flow-mark { display: inline-block; flex: 0 0 auto; border-radius: 8px; box-shadow: 0 8px 24px rgba(100, 93, 246, 0.28); }
.flow-wordmark { font-family: var(--mono); font-size: 17px; font-weight: 600; line-height: 1; letter-spacing: 0; color: var(--text); }
.flow-wordmark .wordmark-dot { color: var(--primary); }

/* ── Brand loaders ───────────────────────────────────────── */
.boot-splash { position: fixed; inset: 0; z-index: 1000; display: grid; place-items: center; padding: 0; background: #050506; color: var(--text); transition: opacity 180ms ease, transform 180ms ease; }
.boot-splash-out { opacity: 0; transform: scale(0.995); pointer-events: none; }
.boot-splash-panel { position: relative; width: min(440px, calc(100vw - 48px)); padding: 0; border: 0; border-radius: 0; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; overflow: visible; }
.boot-splash-panel::before { content: ''; position: absolute; top: 50%; left: 50%; width: 420px; height: 420px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(100,93,246,0.12), transparent 62%); pointer-events: none; }
.boot-splash-cap { display: none; }
.boot-splash-lockup { position: relative; z-index: 1; display: inline-flex; align-items: center; gap: 14px; }
.boot-splash-lockup .flow-mark { width: 44px; height: 44px; animation: splash-pulse 2.6s ease-in-out infinite; }
.boot-splash-lockup .flow-wordmark { font-size: 30px; }
.boot-splash-status { position: relative; z-index: 1; display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; }
.boot-splash-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--running); box-shadow: 0 0 8px var(--running); animation: splash-dot 1.2s ease-in-out infinite; }
.boot-l-bar { position: relative; z-index: 1; width: 160px; height: 4px; margin-top: 10px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
.boot-l-bar::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 35%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 2px; animation: boot-l-bar 1.4s cubic-bezier(0.65,0.05,0.36,1) infinite; }
.flow-loader { display: inline-flex; align-items: center; gap: 9px; color: var(--text-dim); font-family: var(--mono); font-size: 11.5px; }
.loader-orbit { position: relative; width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(100,93,246,0.35); background: rgba(100,93,246,0.06); }
.loader-orbit .core { position: absolute; width: 8px; height: 8px; left: 9px; top: 9px; border-radius: 3px; background: var(--primary); box-shadow: 0 0 18px rgba(100,93,246,0.75); }
.loader-orbit::before, .loader-orbit::after { content: ''; position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: orbit-dot 1.35s linear infinite; }
.loader-orbit::after { width: 5px; height: 5px; background: var(--primary-hi); animation-delay: -0.68s; }
.loader-flow { width: 54px; height: 54px; display: inline-block; }
.loader-flow .arc { fill: none; stroke: var(--primary-hi); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 36 120; animation: flow-arc 1.25s ease-in-out infinite; transform-origin: 27px 27px; }
.loader-stream { display: inline-flex; align-items: end; gap: 4px; height: 26px; }
.loader-stream span { width: 4px; height: 8px; border-radius: 2px; background: var(--accent); animation: stream-rise 880ms ease-in-out infinite; }
.loader-stream span:nth-child(2) { animation-delay: 90ms; }
.loader-stream span:nth-child(3) { animation-delay: 180ms; }
.loader-stream span:nth-child(4) { animation-delay: 270ms; }
.loader-stream span:nth-child(5) { animation-delay: 360ms; }
.loader-bar { position: relative; height: 3px; margin-top: 16px; overflow: hidden; border-radius: 3px; background: var(--surface-3); }
.loader-bar::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 42%; background: linear-gradient(90deg, var(--primary), var(--primary-hi), var(--accent)); animation: loader-bar 1.4s cubic-bezier(0.45,0,0.2,1) infinite; }
@keyframes splash-pulse { 0%, 100% { filter: drop-shadow(0 0 12px rgba(100,93,246,0.4)); } 50% { filter: drop-shadow(0 0 24px rgba(100,93,246,0.8)); } }
@keyframes splash-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes boot-l-bar { 0% { left: -35%; } 100% { left: 100%; } }
@keyframes orbit-dot { from { transform: rotate(0deg) translateX(14px) rotate(0deg); left: 11px; top: 11px; } to { transform: rotate(360deg) translateX(14px) rotate(-360deg); left: 11px; top: 11px; } }
@keyframes flow-arc { 0% { stroke-dashoffset: 0; transform: rotate(0deg); } 50% { stroke-dasharray: 72 120; } 100% { stroke-dashoffset: -156; transform: rotate(360deg); } }
@keyframes stream-rise { 0%, 100% { height: 8px; opacity: 0.45; } 50% { height: 24px; opacity: 1; } }
@keyframes loader-bar { 0% { transform: translateX(-110%); } 100% { transform: translateX(250%); } }

/* ── App shell ────────────────────────────────────────────── */
.app { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 44px 1fr; height: 100vh; min-height: 100vh; }
.sidebar { grid-row: 1 / 3; background: #0a0a0d; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 14px 10px 12px; }
.brand { display: flex; align-items: center; gap: 8px; padding: 4px 8px 14px; }
.brand .flow-logo { min-width: 0; }
.brand .logo { font-family: var(--mono); font-weight: 600; font-size: 17px; letter-spacing: 0; color: var(--text); }

.nav { display: flex; flex-direction: column; gap: 1px; margin-top: 4px; }
.nav-section { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 12px 8px 4px; }
.nav a { display: flex; align-items: center; gap: 10px; padding: 6px 8px; color: var(--text-mid); text-decoration: none; border-radius: 3px; font-size: 12.5px; cursor: pointer; transition: background 100ms; }
.nav a:hover { background: var(--surface); color: var(--text); }
.nav a.active { background: var(--surface-2); color: var(--text); border-left: 2px solid var(--primary); padding-left: 6px; }
.nav a .kbd { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
.nav a .ct { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
.nav a.soon { color: var(--text-faint); cursor: not-allowed; }
.nav a.soon:hover { background: transparent; color: var(--text-dim); }
.nav a.soon svg { opacity: 0.5; }
.soon-badge { margin-left: auto; font-size: 9px; padding: 1px 5px; border-radius: 2px; background: var(--surface-2); color: var(--text-faint); border: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.06em; }
.btn.soon { color: var(--text-faint); opacity: 0.7; }
.btn.soon:hover { color: var(--text-dim); }

.sidebar-foot { margin-top: auto; padding: 10px 8px 4px; display: flex; flex-direction: column; gap: 6px; }
.sidebar-foot .row { display: flex; align-items: center; gap: 6px; }
.theme-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
.theme-toggle button { flex: 1; background: transparent; border: 0; color: var(--text-dim); padding: 4px 6px; cursor: pointer; font-size: 10.5px; font-family: var(--mono); }
.theme-toggle button.on { background: var(--surface-2); color: var(--text); }

/* ── Top bar ──────────────────────────────────────────────── */
.topbar { grid-column: 2; grid-row: 1; display: flex; align-items: center; gap: 10px; padding: 0 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
.crumbs { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-dim); }
.crumbs .sep { color: var(--text-faint); }
.crumbs .cur { color: var(--text); }
.topbar .search { flex: 1; max-width: 480px; margin-left: 14px; position: relative; }
.topbar .search input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 5px 88px 5px 30px; font-size: 12.5px; outline: none; }
.topbar .search input:focus { border-color: var(--primary); }
.topbar .search .ic { position: absolute; left: 8px; top: 7px; color: var(--text-faint); }
.topbar .search .kbd { position: absolute; right: 8px; top: 5px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; }
.topbar .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.topbar .pill-live { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 3px; background: var(--running-dim); color: var(--running); font-size: 11.5px; font-weight: 500; cursor: pointer; }
.topbar .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-mid); border-radius: 3px; padding: 4px 7px; cursor: pointer; font-size: 12px; }
.topbar .icon-btn:hover { background: var(--surface); color: var(--text); }

/* Notifications */
.notif-wrap { position: relative; }
.notif-bell { position: relative; background: transparent; border: 1px solid var(--border); color: var(--text-mid); border-radius: 3px; padding: 5px 8px; cursor: pointer; display: inline-flex; align-items: center; }
.notif-bell:hover { background: var(--surface); color: var(--text); border-color: var(--primary); }
.notif-badge { position: absolute; top: -5px; right: -5px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: var(--waiting); color: #0a0a0d; font-size: 10px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--surface); }
.notif-pop { position: absolute; top: calc(100% + 8px); right: 0; width: 380px; max-height: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 16px 48px rgba(0,0,0,0.6); display: flex; flex-direction: column; z-index: 70; }
.notif-head { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); }
.notif-list { flex: 1; overflow-y: auto; padding: 6px; }
.notif-empty { padding: 32px 12px; text-align: center; color: var(--text-faint); font-size: 11.5px; }
.notif-section { border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 6px; }
.notif-section:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
.notif-section-head { display: flex; align-items: center; gap: 7px; padding: 6px 4px 7px; color: var(--text-dim); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; }
.notif-section-head .count { margin-left: auto; color: var(--text-faint); letter-spacing: 0; text-transform: none; }
.notif-row { width: 100%; display: grid; grid-template-columns: 6px 18px 1fr auto auto; align-items: start; gap: 10px; padding: 10px 10px 10px 8px; background: transparent; border: 0; border-radius: 3px; cursor: pointer; text-align: left; }
.notif-row.event { grid-template-columns: 6px 18px 1fr auto; cursor: default; opacity: 0.9; }
.notif-row:hover { background: var(--surface-2); }
.notif-row-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; opacity: 0.4; }
.notif-row.unread .notif-row-dot { opacity: 1; box-shadow: 0 0 6px currentColor; }
.notif-row-ic { display: inline-flex; align-items: center; justify-content: center; margin-top: 1px; }
.notif-row-body { min-width: 0; }
.notif-row-title { font-size: 12.5px; color: var(--text); line-height: 1.35; }
.notif-row.unread .notif-row-title { color: var(--text); font-weight: 500; }
.notif-row-sub { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notif-row-time { font-size: 10.5px; color: var(--text-faint); white-space: nowrap; padding-top: 1px; }
.notif-dismiss { border: 1px solid var(--border); background: transparent; color: var(--text-faint); width: 22px; height: 22px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.notif-dismiss:hover { color: var(--text); border-color: var(--primary); background: var(--surface); }
.notif-foot { display: flex; gap: 6px; padding: 8px; border-top: 1px solid var(--border); background: var(--surface); }
.hook-health { display: flex; align-items: flex-start; gap: 8px; padding: 9px 10px; border: 1px solid rgba(245,166,35,0.3); background: rgba(245,166,35,0.08); color: var(--text-mid); border-radius: 4px; margin: 8px 0; font-size: 12px; }
.hook-health strong { display: block; color: var(--waiting); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.hook-health p { margin: 0; color: var(--text-dim); line-height: 1.35; }
.hook-health .mono { color: var(--text-mid); font-size: 10.5px; margin-top: 4px; }

/* Terminal launcher (split button + menu) */
.term-launcher { position: relative; display: inline-flex; }
.term-launcher-main { border-top-right-radius: 0; border-bottom-right-radius: 0; }
.term-launcher-caret { border-left: 0; border-top-left-radius: 0; border-bottom-left-radius: 0; padding-left: 5px; padding-right: 5px; }
.term-launcher-menu { position: absolute; top: calc(100% + 6px); right: 0; min-width: 260px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 16px 48px rgba(0,0,0,0.6); padding: 4px; z-index: 70; }
.term-launcher-head { font-size: 9.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px 4px; }
.term-launcher-item { width: 100%; display: grid; grid-template-columns: 18px 1fr auto auto; align-items: center; gap: 10px; padding: 7px 10px; background: transparent; border: 0; border-radius: 3px; color: var(--text); font-size: 12px; cursor: pointer; text-align: left; }
.term-launcher-item:hover { background: var(--surface-2); }
.term-launcher-item.on { background: rgba(100,93,246,0.10); color: var(--primary-hi); }
.term-launcher-item[disabled] { opacity: 0.42; cursor: not-allowed; }
.term-launcher-item[disabled]:hover { background: transparent; color: var(--text); }
.term-launcher-item > svg:first-child { color: var(--text-dim); }
.term-launcher-item.on > svg:first-child { color: var(--primary-hi); }
.term-launcher-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.term-launcher-os { font-size: 10px; color: var(--text-faint); }
.term-launcher-foot { padding: 6px 10px 8px; font-size: 10px; color: var(--text-faint); border-top: 1px solid var(--border); margin-top: 4px; }

.flash-highlight { animation: flash-hl 1.4s ease-out; }
@keyframes flash-hl {
  0% { box-shadow: 0 0 0 2px var(--primary), 0 0 24px rgba(100,93,246,0.4); background: rgba(100,93,246,0.06); }
  100% { box-shadow: 0 0 0 0 transparent; background: transparent; }
}

/* ── Main ─────────────────────────────────────────────────── */
.main { grid-column: 2; grid-row: 2; overflow-y: auto; padding: 20px 24px 60px; }

	/* ── Hero strip ───────────────────────────────────────────── */
	.hero { display: grid; grid-template-columns: minmax(248px, 300px) max-content; gap: 10px; margin-bottom: 12px; align-items: start; justify-content: start; }
	.hero.mc-landing { grid-template-columns: minmax(260px, 1fr) minmax(200px, 240px) minmax(0, 360px); align-items: stretch; gap: 0; padding: 12px 14px; border: 1px solid var(--border); background: var(--surface); border-radius: 6px; }
	.hero-greeting { padding: 2px 14px 2px 2px; min-width: 0; border-right: 1px solid var(--border); }
	.hero-greeting h1 { margin: 0; font-size: 18px; line-height: 1.15; color: var(--text); letter-spacing: 0; }
	.hero-greeting p { margin: 4px 0 0; color: var(--text-dim); font-size: 11.5px; }
	.hero-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
	.hero-integrations { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
	.integration-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; font-size: 11px; line-height: 1; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-dim); white-space: nowrap; }
	.integration-chip .integration-logo { width: 13px; height: 13px; display: block; flex-shrink: 0; object-fit: contain; }
	.integration-chip.state-off .integration-logo { filter: grayscale(1); opacity: 0.55; }
	.integration-chip .integration-name { color: var(--text); font-weight: 500; }
	.integration-chip .integration-status { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); letter-spacing: 0.02em; }
	.integration-chip.state-ok { border-color: rgba(46, 182, 114, 0.4); background: rgba(46, 182, 114, 0.08); color: var(--running); }
	.integration-chip.state-ok .integration-name { color: var(--text); }
	.integration-chip.state-ok .integration-status { color: var(--running); }
	.integration-chip.state-connecting { border-color: rgba(214, 168, 76, 0.4); background: rgba(214, 168, 76, 0.08); color: var(--waiting); }
	.integration-chip.state-connecting .integration-status { color: var(--waiting); }
	.integration-chip.state-off { opacity: 0.78; }
	.integration-chip.state-off .integration-status { color: var(--text-faint); font-style: italic; }
	.hero-stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 4px; min-width: 0; padding: 2px 14px; border-right: 1px solid var(--border); }
.stat { padding: 8px 10px; border-radius: 4px; border: 1px solid transparent; background: var(--bg-2); }
.stat .num { font-family: var(--mono); font-size: 20px; font-weight: 500; line-height: 1; color: var(--text); }
.stat .lbl { font-size: 10px; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.stat.running .num { color: var(--running); }
.stat.waiting { border-color: rgba(245, 166, 35, 0.3); background: var(--waiting-dim); }
.stat.waiting .num { color: var(--waiting); }
.stat.stale .num { color: var(--stale); }

	/* ── Heatmap ──────────────────────────────────────────────── */
	.heatmap { padding: 12px 14px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); }
	.heatmap-head { display: flex; align-items: center; gap: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 10px; }
.heatmap-row { display: grid; grid-template-columns: repeat(60, 1fr); gap: 2px; }
.hm-cell { height: 22px; border-radius: 1px; }
.heatmap-axis { display: flex; font-size: 10px; color: var(--text-faint); margin-top: 6px; }

/* ── Section headers ──────────────────────────────────────── */
.section-head { display: flex; align-items: baseline; gap: 12px; margin: 8px 0 14px; }
.section-head h2 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; color: var(--text); text-transform: uppercase; letter-spacing: 0.08em; }
.section-head .count { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.section-head .right { margin-left: auto; }

.tab-strip { display: flex; gap: 1px; background: var(--surface-2); border-radius: 3px; padding: 2px; }
.tab-strip button { background: transparent; border: 0; color: var(--text-dim); padding: 3px 10px; font-size: 11.5px; cursor: pointer; border-radius: 2px; font-family: var(--mono); }
.tab-strip button.active { background: var(--bg); color: var(--text); }
.tab-strip button:hover { color: var(--text); }

/* ── Agent grid + tiles ───────────────────────────────────── */
.agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.agent-grid.big { grid-template-columns: repeat(2, 1fr); }

.tile { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; position: relative; overflow: hidden; cursor: pointer; transition: border-color 120ms, transform 120ms; }
.tile:hover { border-color: var(--border-strong); }
.tile-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--idle); opacity: 0.8; }
.tile.running .tile-stripe { background: var(--running); box-shadow: 0 0 12px var(--running); }
.tile.waiting .tile-stripe { background: var(--waiting); box-shadow: 0 0 14px var(--waiting); animation: pulse-bar 1.8s ease-in-out infinite; }
.tile.stale .tile-stripe { background: var(--stale); }
.tile.idle .tile-stripe { background: var(--idle); }
.tile.dead .tile-stripe { background: var(--error); }
.tile.error .tile-stripe { background: var(--error); }
@keyframes pulse-bar { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

.tile.waiting { background: linear-gradient(0deg, var(--surface), var(--surface) 50%, var(--waiting-dim) 100%); border-color: rgba(245, 166, 35, 0.3); }
.tile.dead { background: linear-gradient(0deg, var(--surface), var(--surface) 50%, var(--error-dim) 100%); border-color: rgba(226, 87, 87, 0.3); }
.tile.stale { opacity: 0.92; }

.tile-body { padding: 12px 14px 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.tile-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tile-spacer { flex: 1; }
.tile-slug { font-family: var(--mono); font-size: 13.5px; font-weight: 600; color: var(--text); letter-spacing: 0; }
.tile-name { font-size: 12.5px; color: var(--text-mid); line-height: 1.35; margin-top: -3px; }
.tile-title { font-size: 14px; font-weight: 650; color: var(--text); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tile-ref { font-size: 11.5px; color: var(--text-mid); line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tile-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
.tile-meta .m-sep { color: var(--text-faint); }

.tile-wait { background: rgba(245, 166, 35, 0.08); border: 1px solid rgba(245, 166, 35, 0.25); border-radius: 3px; padding: 8px 10px; }
.tile-wait .wait-head { font-size: 11px; color: var(--waiting); font-weight: 500; display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.tile-wait .wait-cmd { font-family: var(--mono); font-size: 11.5px; color: var(--text); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile-wait .wait-why { font-size: 11.5px; color: var(--text-dim); margin-top: 4px; line-height: 1.4; }
.tile-wait.err { background: var(--error-dim); border-color: rgba(226, 87, 87, 0.3); }
.tile-wait.err .wait-head { color: var(--error); }
.tile-wait .wait-cmd.err { color: var(--error); }

.tile-pixel { margin-top: 2px; }
.pixel-indicator { display: grid; grid-template-columns: repeat(60, 1fr); gap: 1px; }
.pixel-indicator .cell { background: rgba(255,255,255,0.04); border-radius: 1px; }
.pixel-foot { display: flex; align-items: center; font-size: 10.5px; color: var(--text-dim); margin-top: 5px; }
.tokens-bar { height: 2px; background: var(--surface-3); border-radius: 1px; margin-top: 4px; overflow: hidden; }
.tokens-bar span { display: block; height: 100%; background: var(--accent); opacity: 0.6; }
.tokens-bar.ctx-ok span { background: var(--running, #4caf50); opacity: 0.7; }
.tokens-bar.ctx-warn span { background: #d8a017; opacity: 0.85; }
.tokens-bar.ctx-danger span { background: #d8504a; opacity: 0.95; }
.ctx-text.ctx-ok { color: var(--text-dim); }
.ctx-text.ctx-warn { color: #d8a017; }
.ctx-text.ctx-danger { color: #d8504a; font-weight: 600; }

.tile-action-row { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.tile-last { font-size: 10.5px; color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tile-actions { display: flex; gap: 4px; }

/* ── Pills, chips, dots ──────────────────────────────────── */
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 3px; font-size: 10.5px; font-weight: 500; line-height: 1.4; text-transform: lowercase; border: 1px solid transparent; white-space: nowrap; }
.pill.running { background: var(--running-dim); color: var(--running); }
.pill.waiting { background: var(--waiting-dim); color: var(--waiting); }
.pill.idle { background: var(--idle-dim); color: var(--text-mid); }
.pill.stale { background: var(--stale-dim); color: var(--stale); }
.pill.dead, .pill.error { background: var(--error-dim); color: var(--error); }
.pill.in-progress { background: rgba(100, 93, 246, 0.15); color: var(--primary-hi); }
.pill.backlog { background: var(--idle-dim); color: var(--text-mid); }
.pill.done { background: var(--running-dim); color: var(--running); opacity: 0.7; }

.pill.prio-high { background: rgba(226, 87, 87, 0.12); color: #f08080; }
.pill.prio-medium { background: var(--surface-2); color: var(--text-mid); }
.pill.prio-low { background: var(--idle-dim); color: var(--text-faint); }

.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--idle); flex-shrink: 0; }
.dot.running { background: var(--running); box-shadow: 0 0 8px var(--running); animation: pulse-dot 1.6s ease-in-out infinite; }
.dot.waiting { background: var(--waiting); box-shadow: 0 0 8px var(--waiting); animation: pulse-dot 1.4s ease-in-out infinite; }
.dot.idle { background: var(--idle); opacity: 0.6; }
.dot.stale { background: var(--stale); opacity: 0.7; }
.dot.dead { background: var(--error); opacity: 0.7; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.provider-mark { border-radius: 3px; display: block; flex-shrink: 0; object-fit: contain; }
.agent-chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 7px 2px 3px; border-radius: 4px; font-family: var(--mono); font-size: 10.5px; text-transform: lowercase; letter-spacing: 0.02em; font-weight: 500; border: 1px solid var(--border); background: var(--surface-2); white-space: nowrap; flex-shrink: 0; }
.agent-chip.claude { padding: 3px 5px; }
.agent-chip svg, .agent-chip img { border-radius: 3px; display: block; flex-shrink: 0; }
.agent-chip .lbl { white-space: nowrap; }
.tile-meta .mono { white-space: nowrap; }
.group-sub { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.agent-chip.claude { color: #e8a37a; border-color: rgba(217, 119, 87, 0.4); background: rgba(217, 119, 87, 0.08); }
.agent-chip.codex { color: #d4d4d4; border-color: rgba(180, 180, 180, 0.3); background: rgba(20, 20, 20, 0.7); }
.agent-chip::before { content: none; }
.agent-chip .lbl { font-weight: 500; }

/* ── Sessions grouping ─────────────────────────────────── */
.action-bar { flex-wrap: wrap; }
.filter-group { display: flex; gap: 4px; align-items: center; padding: 0 10px 0 0; border-right: 1px solid var(--border); margin-right: 6px; }
.filter-group:last-of-type { border-right: none; }
.filter-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; font-family: var(--mono); }
.right-meta { font-size: 11px; color: var(--text-dim); margin-left: auto; }
.session-group { margin-top: 18px; }
.session-group:first-of-type { margin-top: 8px; }
.group-head { display: flex; align-items: center; gap: 8px; padding: 8px 0 10px; border-bottom: 1px dashed var(--border); margin-bottom: 12px; }
.group-title { font-size: 13px; font-weight: 600; color: var(--text); }
.group-count { font-size: 10px; color: var(--text-dim); background: var(--surface-2); padding: 1px 6px; border-radius: 8px; border: 1px solid var(--border); }
.group-sub { font-size: 11px; color: var(--text-dim); font-style: italic; }
.empty-state { padding: 40px; text-align: center; color: var(--text-dim); }

/* ── Create flow modal ─────────────────────────────────── */
.modal.create-flow { max-height: calc(100vh - 48px); display: flex; flex-direction: column; }
.modal.create-flow .modal-body { padding: 18px 20px; }
.modal.create-flow .modal-body { overflow: auto; }
.modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; margin-left: auto; padding: 4px; border-radius: 3px; }
.modal-close:hover { background: var(--surface-2); color: var(--text); }
.form-row { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-family: var(--mono); font-weight: 500; }
.form-input { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; font-size: 13px; color: var(--text); font-family: var(--sans); outline: none; transition: border-color 120ms; }
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124, 92, 255, 0.15); }
.form-input.mono { font-family: var(--mono); font-size: 12px; }
.form-input::placeholder { color: var(--text-faint); }
.form-hint { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.form-hint b { color: var(--accent); font-weight: 500; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.seg { display: inline-flex; gap: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px; }
.seg-btn { background: none; border: none; color: var(--text-dim); padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 3px; display: inline-flex; align-items: center; gap: 5px; font-family: var(--sans); }
.seg-btn:hover { color: var(--text); }
.seg-btn.on { background: var(--surface-2); color: var(--text); }
textarea.form-input { resize: vertical; font-family: var(--mono); font-size: 12px; line-height: 1.5; }
select.form-input { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%); background-position: calc(100% - 14px) 50%, calc(100% - 10px) 50%; background-size: 4px 4px, 4px 4px; background-repeat: no-repeat; padding-right: 24px; }
.image-drop { display: flex; align-items: center; gap: 10px; min-height: 54px; padding: 10px 12px; border: 1px dashed var(--border); border-radius: 4px; background: rgba(255,255,255,0.015); color: var(--text-dim); cursor: pointer; transition: border-color 120ms, background 120ms, color 120ms; }
.image-drop:hover, .image-drop.dragging { border-color: var(--accent); background: rgba(124, 92, 255, 0.08); color: var(--text); }
.image-drop-icon { width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface-2); display: inline-flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; }
.image-drop-copy { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.image-drop-main { color: var(--text); font-size: 12.5px; }
.image-drop-sub { font-size: 11px; color: var(--text-dim); }
.image-input { display: none; }
.image-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
.image-chip { display: inline-flex; align-items: center; gap: 6px; max-width: 100%; min-width: 0; padding: 4px 5px 4px 7px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface-2); color: var(--text-mid); font-size: 11px; }
.image-chip-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
.image-chip-size { color: var(--text-faint); font-size: 10px; }
.image-chip-remove { width: 18px; height: 18px; border: none; border-radius: 3px; background: transparent; color: var(--text-dim); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.image-chip-remove:hover { color: var(--text); background: var(--surface-3); }
.modal-foot { align-items: center; }
.btn[disabled] { opacity: 0.4; cursor: not-allowed; }

.branch-chip { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-mid); padding: 1px 6px; border-radius: 3px; background: var(--surface-2); }
.pr-link-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; min-width: 0; }
.pr-chip { display: inline-flex; align-items: center; gap: 4px; max-width: 100%; padding: 2px 6px; border: 1px solid rgba(100,93,246,0.35); border-radius: 3px; background: rgba(100,93,246,0.08); color: var(--primary-hi); text-decoration: none; font-size: 10.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pr-chip:hover { border-color: var(--primary); background: rgba(100,93,246,0.14); }
.pr-chip.merged { color: var(--running); border-color: rgba(46,182,114,0.35); background: rgba(46,182,114,0.08); }
.pr-chip.closed { color: var(--text-dim); border-color: var(--border); background: var(--surface-2); }
.branch-switcher { position: relative; }
.branch-switcher-btn { display: inline-flex; align-items: center; gap: 5px; height: 24px; max-width: 230px; padding: 2px 7px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface-2); color: var(--text-mid); cursor: pointer; font-size: 11px; }
.branch-switcher-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }
.branch-switcher-btn .mono { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.branch-menu { position: absolute; top: calc(100% + 6px); left: 0; width: 300px; max-width: calc(100vw - 32px); background: var(--surface); border: 1px solid var(--border-strong); border-radius: 5px; box-shadow: 0 16px 48px rgba(0,0,0,0.45); z-index: 60; padding: 7px; }
.branch-search { display: flex; align-items: center; gap: 6px; height: 28px; padding: 0 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text-dim); }
.branch-search input { flex: 1; min-width: 0; background: transparent; border: 0; outline: 0; color: var(--text); font: 11.5px var(--mono); }
.branch-list { max-height: 270px; overflow-y: auto; padding-top: 6px; display: flex; flex-direction: column; gap: 2px; }
.branch-item { display: grid; grid-template-columns: 16px minmax(0, 1fr); align-items: center; gap: 6px; width: 100%; padding: 6px 7px; border: 0; border-radius: 3px; background: transparent; color: var(--text-mid); cursor: pointer; text-align: left; font-size: 11.5px; }
.branch-item:hover { background: var(--surface-2); color: var(--text); }
.branch-item.on { color: var(--primary-hi); background: rgba(124,92,255,0.10); }
.branch-item .mono { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.branch-empty { padding: 10px 8px; color: var(--text-faint); font-size: 11px; }

.tag-chip { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 2px; background: var(--surface-2); color: var(--text-dim); font-size: 10.5px; font-family: var(--mono); }
.dependency-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 5px; min-width: 0; margin-top: 6px; }
.dependency-strip.compact { margin-top: 5px; }
.dependency-chip { display: inline-flex; align-items: center; gap: 4px; max-width: 100%; min-width: 0; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface-2); color: var(--text-dim); font-family: var(--mono); font-size: 10.5px; line-height: 1.25; }
.dependency-chip.parent.open { color: var(--waiting); border-color: rgba(245,166,35,0.34); background: var(--waiting-dim); }
.dependency-chip.parent.done { color: var(--running); border-color: rgba(46,182,114,0.28); background: var(--running-dim); }
.dependency-chip.children { color: var(--primary-hi); border-color: rgba(139,135,248,0.34); background: rgba(100,93,246,0.12); }
.dependency-chip strong { color: var(--text); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dependency-chip em { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-faint); font-style: normal; }
.table .dependency-strip, .tbl .dependency-strip { margin-top: 0; }

.kbd { display: inline-block; padding: 1px 5px; font-family: var(--mono); font-size: 10.5px; background: var(--surface-2); color: var(--text-mid); border-radius: 3px; border: 1px solid var(--border); }

/* ── Buttons ─────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-mid); border-radius: 3px; font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all 100ms; white-space: nowrap; }
.btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }
.btn.sm { padding: 3px 8px; font-size: 11px; }
.btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
.btn.primary:hover { background: var(--primary-hi); }
.btn.green { background: var(--running-dim); border-color: rgba(46,182,114,0.4); color: var(--running); }
.btn.green:hover { background: rgba(46,182,114,0.22); }
.btn.danger { background: var(--error-dim); border-color: rgba(226,87,87,0.4); color: var(--error); }
.btn.danger:hover { background: rgba(226,87,87,0.2); }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--surface-2); }
.btn[disabled] { opacity: 0.4; cursor: not-allowed; }
.btn[disabled]:hover { background: var(--surface-2); color: var(--text-mid); border-color: var(--border); }

/* ── Ribbon (backlog) ────────────────────────────────────── */
.ribbon { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
.ribbon-chip { flex: 0 0 240px; border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; background: var(--surface); cursor: pointer; transition: border-color 100ms; }
.ribbon-chip:hover { border-color: var(--primary); }
.ribbon-chip.disabled { opacity: 0.45; cursor: not-allowed; }
.ribbon-chip.disabled:hover { border-color: var(--border); }
.ribbon-chip .top { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
.ribbon-chip .nm { font-size: 12px; color: var(--text); line-height: 1.3; }
.ribbon-chip .meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 5px; }

	/* ── Action bar ─────────────────────────────────────────── */
	.heatmap.gh { padding: 2px 2px 2px 14px; background: transparent; border: 0; border-radius: 0; min-width: 0; width: 100%; max-width: 360px; box-sizing: border-box; overflow: visible; justify-self: start; }
	.heatmap.gh .heatmap-head { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-mid); margin-bottom: 8px; font-weight: 500; flex-wrap: wrap; }
	.gh-action-count { margin-left: 14px; color: var(--text-faint); }
		.gh-grid { display: grid; grid-template-columns: 22px minmax(0, 1fr); gap: 6px; align-items: stretch; }
		.gh-days { display: flex; flex-direction: column; gap: 2px; padding-top: 14px; color: var(--text-dim); }
	.gh-day-label { font-size: 9px; line-height: 1; display: flex; align-items: center; flex: 1 1 0; min-height: 0; }
		.gh-chart { width: 100%; min-width: 0; overflow: visible; padding-bottom: 1px; }
	.gh-months { display: grid; grid-template-columns: repeat(12, 1fr); gap: 2px; height: 12px; }
	.gh-month-cell { font-size: 9px; color: var(--text-dim); line-height: 10px; white-space: nowrap; text-transform: uppercase; overflow: visible; }
	.gh-weeks { display: grid; grid-template-columns: repeat(12, 1fr); gap: 2px; }
	.gh-week { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
	.gh-cell { position: relative; width: 100%; aspect-ratio: 1 / 1; min-width: 0; border-radius: 2px; border: 1px solid rgba(255,255,255,0.035); transition: outline-color 80ms, transform 80ms, border-color 80ms; cursor: default; }
	.gh-cell:hover { outline: 1px solid var(--running); outline-offset: 2px; transform: scale(1.08); border-color: rgba(255,255,255,0.16); z-index: 5; }
	.gh-cell[data-tip]:hover::after, .gh-cell[data-tip]:focus-visible::after { content: attr(data-tip); position: absolute; left: 50%; bottom: calc(100% + 9px); z-index: 20; width: max-content; max-width: 220px; transform: translateX(-50%); padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: 4px; background: var(--surface); box-shadow: 0 10px 28px rgba(0,0,0,0.45); color: var(--text); font-family: var(--mono); font-size: 10.5px; line-height: 1.35; white-space: normal; pointer-events: none; }
	.gh-cell[data-tip]:hover::before, .gh-cell[data-tip]:focus-visible::before { content: ''; position: absolute; left: 50%; bottom: calc(100% + 4px); z-index: 21; width: 8px; height: 8px; transform: translateX(-50%) rotate(45deg); background: var(--surface); border-right: 1px solid var(--border-strong); border-bottom: 1px solid var(--border-strong); pointer-events: none; }
	/* Last 3 weeks: anchor tooltip to the cell's right edge so it doesn't
	   overflow the viewport. The arrow follows the right anchor. */
	.gh-weeks > .gh-week:nth-last-child(-n+3) .gh-cell[data-tip]:hover::after,
	.gh-weeks > .gh-week:nth-last-child(-n+3) .gh-cell[data-tip]:focus-visible::after {
	  left: auto; right: 0; transform: none;
	}
	.gh-weeks > .gh-week:nth-last-child(-n+3) .gh-cell[data-tip]:hover::before,
	.gh-weeks > .gh-week:nth-last-child(-n+3) .gh-cell[data-tip]:focus-visible::before {
	  left: auto; right: 8px; transform: rotate(45deg);
	}
	/* First week: anchor tooltip to the cell's left edge. */
	.gh-weeks > .gh-week:first-child .gh-cell[data-tip]:hover::after,
	.gh-weeks > .gh-week:first-child .gh-cell[data-tip]:focus-visible::after {
	  left: 0; right: auto; transform: none;
	}
	.gh-weeks > .gh-week:first-child .gh-cell[data-tip]:hover::before,
	.gh-weeks > .gh-week:first-child .gh-cell[data-tip]:focus-visible::before {
	  left: 8px; right: auto; transform: rotate(45deg);
	}
	.gh-legend { display: flex; align-items: center; justify-content: flex-end; gap: 3px; margin-top: 4px; color: var(--text-dim); font-size: 9px; }
	.gh-legend .gh-cell { width: 8px; height: 8px; aspect-ratio: auto; flex: none; }
.action-bar { display: flex; align-items: center; gap: 6px; padding: 8px 0; margin-bottom: 12px; border-bottom: 1px solid var(--border); }

/* ── Project / playbook detail pages ───────────────────── */
.entity-page { max-width: 1480px; }
.entity-hero { display: flex; align-items: flex-start; gap: 16px; margin: 10px 0 18px; }
.entity-hero-main { min-width: 0; flex: 1; }
.entity-kicker { display: flex; align-items: center; gap: 8px; color: var(--text-faint); font-size: 12px; margin-bottom: 14px; }
.entity-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.entity-title-row h1 { margin: 0; color: var(--text); font-size: 30px; line-height: 1.12; letter-spacing: 0; font-weight: 700; }
.entity-title-editor { display: flex; align-items: center; gap: 6px; flex: 1 1 460px; min-width: min(100%, 320px); max-width: 780px; }
.entity-title-input { width: 100%; min-width: 0; height: 40px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--surface-2); color: var(--text); padding: 4px 10px; font-size: 24px; line-height: 1.2; font-weight: 700; outline: none; }
.entity-title-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary) 22%, transparent); }
.entity-subtitle { margin: 10px 0 0; color: var(--text-mid); font-size: 17px; line-height: 1.45; }
.entity-meta-row { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 14px; color: var(--text-faint); font-size: 12px; }
.entity-meta-row span { display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
.entity-hero-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.entity-layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 18px; align-items: start; }
.entity-main { min-width: 0; }
.entity-side { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
.entity-card { border: 1px solid var(--border); background: var(--surface); border-radius: 8px; padding: 16px; }
.entity-card h3 { margin: 0 0 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 600; display: flex; align-items: center; gap: 7px; }
.entity-stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 18px 0; max-width: 540px; }
.entity-stat { border: 1px solid var(--border); background: var(--surface); border-radius: 8px; padding: 16px; min-height: 92px; }
.entity-stat .label { text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-size: 11px; }
.entity-stat .value { margin-top: 18px; font-size: 30px; color: var(--text); font-weight: 650; }
.entity-tabs { display: flex; gap: 18px; border-bottom: 1px solid var(--border); margin: 20px 0; overflow-x: auto; }
.entity-tabs button { border: 0; background: transparent; color: var(--text-dim); padding: 12px 10px 12px 0; display: inline-flex; align-items: center; gap: 7px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.entity-tabs button:hover { color: var(--text); }
.entity-tabs button.active { color: var(--text); border-bottom-color: var(--primary); }
.markdown-rendered { color: var(--text-mid); font-size: 15px; line-height: 1.62; max-width: 980px; }
.markdown-rendered.empty { color: var(--text-faint); font-family: var(--mono); font-size: 12px; }
.markdown-rendered h1 { margin: 0 0 28px; color: var(--text); font-size: 28px; line-height: 1.2; letter-spacing: 0; }
.markdown-rendered h2 { margin: 34px 0 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 21px; line-height: 1.25; letter-spacing: 0; }
.markdown-rendered h3 { margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 17px; line-height: 1.3; letter-spacing: 0; text-transform: none; }
.markdown-rendered h4 { margin: 22px 0 10px; color: var(--text); font-size: 14px; }
.markdown-rendered p { margin: 0 0 16px; }
.markdown-rendered ul, .markdown-rendered ol { margin: 0 0 22px; padding-left: 22px; }
.markdown-rendered li { margin: 7px 0; }
.markdown-rendered code { font-family: var(--mono); font-size: 0.92em; padding: 2px 5px; border-radius: 4px; background: var(--surface-3); color: var(--text); }
.markdown-rendered pre { overflow: auto; padding: 12px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }
.md-table-wrap { overflow-x: auto; margin: 0 0 16px; }
.markdown-rendered table { border-collapse: collapse; margin: 0; font-size: 0.95em; max-width: 100%; }
.markdown-rendered th, .markdown-rendered td { border: 1px solid var(--border); padding: 6px 10px; vertical-align: top; }
.markdown-rendered th { background: var(--surface-2); color: var(--text); font-weight: 600; }
.markdown-rendered tr:nth-child(even) td { background: rgba(255,255,255,0.018); }
.markdown-rendered pre code { padding: 0; background: transparent; }
.markdown-rendered blockquote { margin: 0 0 18px; padding: 10px 14px; border-left: 3px solid var(--primary); color: var(--text-mid); background: rgba(100,93,246,0.06); }
.markdown-rendered hr { border: 0; border-top: 1px solid var(--border); margin: 22px 0; }
.entity-task-list, .run-history-table { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface); }
.entity-task-row, .run-history-row { display: grid; grid-template-columns: 160px minmax(0, 1fr) auto auto auto; gap: 14px; align-items: center; min-height: 48px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.entity-task-row:last-child, .run-history-row:last-child { border-bottom: 0; }
.entity-task-row .name, .run-history-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.readable-files { display: grid; gap: 12px; }
.readable-file { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); padding: 16px; }
.readable-file.closed { padding: 0; overflow: hidden; }
button.readable-file-head { width: 100%; display: flex; align-items: center; gap: 9px; margin-bottom: 12px; padding: 0; background: transparent; border: 0; color: var(--text-mid); font: inherit; text-align: left; cursor: pointer; }
button.readable-file-head:hover { color: var(--text); }
button.readable-file-head:focus-visible { outline: 1px solid var(--primary); outline-offset: 2px; border-radius: 3px; }
.readable-file.closed button.readable-file-head { margin-bottom: 0; padding: 12px 16px; }
.readable-file-head .dim { margin-left: auto; color: var(--text-faint); }
@media (max-width: 1100px) {
  .entity-layout { grid-template-columns: 1fr; }
  .entity-hero { flex-direction: column; }
  .entity-hero-actions { margin-left: 0; justify-content: flex-start; }
  .entity-task-row, .run-history-row { grid-template-columns: 1fr; gap: 8px; }
}

/* ── Overview / monitor ───────────────────────────────────── */
.overview-page { display: flex; flex-direction: column; gap: 14px; }
.overview-hero { display: flex; align-items: flex-start; gap: 16px; padding: 16px 0 2px; }
.overview-hero h1 { margin: 0; font-size: 26px; line-height: 1.1; color: var(--text); letter-spacing: 0; }
.overview-hero p { margin: 7px 0 0; color: var(--text-dim); font-size: 13px; }
.overview-hero .btn { margin-left: auto; }
.overview-kicker { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 6px; }
.overview-chat { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border-strong); background: var(--surface); border-radius: 6px; }
.overview-chat input { flex: 1; min-width: 0; background: transparent; border: 0; outline: 0; color: var(--text); font-size: 15px; }
.overview-chat input::placeholder { color: var(--text-faint); }
.overview-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
.overview-card { border: 1px solid var(--border); background: var(--surface); border-radius: 5px; overflow: hidden; min-width: 0; }
.overview-card-head { display: flex; align-items: center; gap: 8px; min-height: 38px; padding: 8px 10px; border-bottom: 1px solid var(--border); background: var(--bg-2); }
.overview-card-head h2 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-mid); font-weight: 500; }
.overview-card-head .count { color: var(--text-faint); font-size: 10.5px; }
.overview-card-head .btn { margin-left: auto; }
.overview-card-body { display: flex; flex-direction: column; gap: 0; }
.overview-row { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 9px; align-items: center; padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
.overview-row:last-child { border-bottom: 0; }
.overview-row.approval { background: rgba(245,166,35,0.04); }
.overview-row.success { background: rgba(46,182,114,0.04); }
.overview-row .source { color: var(--text-faint); font-size: 10.5px; text-transform: uppercase; }
.overview-row .body { min-width: 0; color: var(--text); }
.overview-row .body p { margin: 2px 0 0; color: var(--text-dim); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.overview-row .row-actions { display: flex; gap: 5px; align-items: center; }
.overview-empty { min-height: 58px; padding: 14px 12px; color: var(--text-faint); font-size: 11.5px; display: flex; align-items: center; gap: 10px; }
.overview-empty .flow-mark { opacity: 0.84; box-shadow: 0 6px 18px rgba(100,93,246,0.20); }
.notif-group { border-bottom: 1px solid var(--border); }
.notif-group:last-child { border-bottom: 0; }
.notif-group-head { width: 100%; display: grid; grid-template-columns: auto auto minmax(0, 1fr) auto auto auto; align-items: center; gap: 7px; min-height: 34px; padding: 8px 10px; border: 0; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.015); color: var(--text-mid); text-align: left; cursor: pointer; }
.notif-group-head:hover { background: var(--surface-2); color: var(--text); }
.notif-group-head span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.notif-group-count { color: var(--text-faint); font-size: 10.5px; }
.notif-group-badge { color: var(--text-dim); font-size: 10px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); }
.notif-group-badge.approval { color: var(--waiting); border-color: rgba(245,166,35,0.35); }
.notif-group .overview-row { padding-left: 28px; }
.monitor-strip { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
.monitor-source { display: flex; align-items: center; gap: 8px; padding: 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); }
.monitor-source p { margin: 2px 0 0; font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.monitor-layout { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(340px, 0.8fr); gap: 12px; }
.rules-table { display: flex; flex-direction: column; }
.rule-row { display: grid; grid-template-columns: 74px minmax(0, 1fr) 170px; gap: 8px; align-items: center; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11.5px; }
.rule-row select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 3px; padding: 4px 6px; font: 11.5px var(--mono); }
.inbox-page { display: flex; flex-direction: column; gap: 14px; max-width: 1520px; }
.inbox-hero { display: flex; align-items: flex-start; gap: 16px; padding: 4px 0 2px; }
.inbox-hero h1 { margin: 0; color: var(--text); font-size: 28px; line-height: 1.12; letter-spacing: 0; }
.inbox-hero p { margin: 7px 0 0; max-width: 820px; color: var(--text-dim); font-size: 13px; }
.inbox-hero .btn { margin-left: auto; }
/* Inbox-merger redesign: header replaces hero, sync strip sits above safety bar */
.inbox-header { display: flex; align-items: flex-start; gap: 16px; padding: 4px 0 2px; }
.inbox-header h1 { margin: 0; color: var(--text); font-size: 28px; line-height: 1.12; letter-spacing: 0; }
.inbox-header p { margin: 7px 0 0; max-width: 820px; color: var(--text-dim); font-size: 13px; }
.inbox-header > .btn { margin-left: auto; }
.inbox-sync-strip { display: flex; align-items: stretch; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); }
.inbox-sync-sources { display: flex; align-items: stretch; gap: 18px; flex: 1; flex-wrap: wrap; }
.inbox-sync-source { display: flex; align-items: center; gap: 10px; min-width: 0; padding: 4px 12px 4px 0; border-right: 1px solid var(--border); }
.inbox-sync-source:last-child { border-right: 0; }
.inbox-sync-source svg { color: var(--text-mid); flex: 0 0 auto; }
.inbox-sync-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.inbox-sync-name { color: var(--text); font-size: 12px; letter-spacing: 0.01em; }
.inbox-sync-sub { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 10.5px; white-space: nowrap; }
.inbox-sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); display: inline-block; }
.inbox-sync-dot.ok { background: var(--running); box-shadow: 0 0 0 2px rgba(46,182,114,0.18); }
.inbox-sync-dot.error { background: var(--dead, #ef5b5b); box-shadow: 0 0 0 2px rgba(239,91,91,0.18); }
.inbox-sync-dot.syncing { background: var(--primary-hi); box-shadow: 0 0 0 2px rgba(100,93,246,0.22); animation: inbox-sync-pulse 1.2s ease-in-out infinite; }
.inbox-sync-dot.unknown { background: var(--text-faint); }
@keyframes inbox-sync-pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
.inbox-sync-source.is-syncing .inbox-sync-name { color: var(--primary-hi); }
.inbox-sync-source.status-error .inbox-sync-sub { color: var(--waiting); }
.inbox-sync-actions { display: flex; align-items: center; gap: 8px; }
.inbox-sync-empty { color: var(--text-faint); font-size: 11px; padding: 4px 0; }
.inbox-notif-state { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; border: 1px solid var(--border); border-radius: 4px; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; }
.inbox-notif-state.granted { color: var(--running); border-color: rgba(46,182,114,0.32); background: var(--running-dim); }
.inbox-notif-state.denied { color: var(--text-faint); border-color: var(--border); background: var(--surface-2); }
/* Settings drawer (gear-icon affordance) */
.inbox-settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.42); display: flex; justify-content: flex-end; z-index: 80; }
.inbox-settings-drawer { width: min(480px, 92vw); height: 100%; background: var(--surface); border-left: 1px solid var(--border-strong); padding: 18px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
.inbox-settings-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.inbox-settings-head h2 { margin: 0; color: var(--text); font-size: 18px; }
.inbox-settings-help { margin: 0; color: var(--text-dim); font-size: 12px; line-height: 1.5; }
/* Rule-line details expander on each item row */
.inbox-rule-details { color: var(--text-faint); }
.inbox-rule-details summary { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; padding: 2px 0; color: var(--text-faint); font-size: 10.5px; list-style: none; }
.inbox-rule-details summary::-webkit-details-marker { display: none; }
.inbox-rule-details summary::before { content: '▸'; display: inline-block; transition: transform 0.12s ease; }
.inbox-rule-details[open] summary::before { transform: rotate(90deg); }
.inbox-rule-details .inbox-rule-line { padding-top: 4px; }
.inbox-safety { display: flex; align-items: flex-start; gap: 9px; padding: 10px 12px; border: 1px solid rgba(245,166,35,0.32); border-radius: 5px; background: rgba(245,166,35,0.07); color: var(--text-mid); font-size: 12.5px; line-height: 1.45; }
.inbox-safety svg { color: var(--waiting); flex: 0 0 auto; margin-top: 2px; }
.inbox-layout { display: grid; grid-template-columns: minmax(0, 1fr) 390px; gap: 12px; align-items: start; }
.inbox-main, .inbox-side { min-width: 0; }
.inbox-side { display: flex; flex-direction: column; gap: 12px; }
.inbox-toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.inbox-toolbar .tab-strip { flex-wrap: wrap; }
.inbox-toolbar .tab-strip button { display: inline-flex; align-items: center; gap: 6px; }
.inbox-toolbar .tab-strip button span { color: var(--text-faint); font-size: 10px; }
.inbox-search { margin-left: auto; display: grid; grid-template-columns: 16px minmax(140px, 240px); align-items: center; gap: 6px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text-faint); }
.inbox-search input { min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 12px; }
.inbox-search input::placeholder { color: var(--text-faint); }
.inbox-list { display: flex; flex-direction: column; gap: 8px; }
.inbox-item { display: grid; grid-template-columns: 34px minmax(0, 1fr) auto; gap: 12px; align-items: stretch; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); }
.inbox-item.needs-review { border-color: rgba(245,166,35,0.36); background: linear-gradient(90deg, rgba(245,166,35,0.055), rgba(20,20,23,0.96) 34%); }
.inbox-item.spawn { border-left: 2px solid var(--running); }
.inbox-item.draft { border-left: 2px solid var(--primary-hi); }
.inbox-item.ping { border-left: 2px solid var(--waiting); }
.inbox-item.ignore { opacity: 0.72; }
.inbox-item-rail { display: flex; align-items: flex-start; justify-content: center; padding-top: 2px; }
.inbox-outcome { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 5px; background: var(--surface-2); color: var(--text-dim); }
.inbox-outcome.spawn { color: var(--running); background: var(--running-dim); border-color: rgba(46,182,114,0.35); }
.inbox-outcome.draft { color: var(--primary-hi); background: rgba(100,93,246,0.12); border-color: rgba(139,135,248,0.38); }
.inbox-outcome.ping { color: var(--waiting); background: var(--waiting-dim); border-color: rgba(245,166,35,0.35); }
.inbox-outcome.ignore { color: var(--text-faint); }
.inbox-item-main { min-width: 0; display: flex; flex-direction: column; gap: 7px; }
.inbox-item-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-width: 0; }
.inbox-source, .inbox-kind { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
.inbox-kind { color: var(--text-mid); background: var(--surface-2); }
.inbox-time { margin-left: auto; color: var(--text-faint); font-size: 10.5px; white-space: nowrap; }
.inbox-item h3 { margin: 0; color: var(--text); font-size: 14px; line-height: 1.3; letter-spacing: 0; }
.inbox-untrusted { border: 1px dashed rgba(245,166,35,0.34); border-radius: 4px; background: rgba(0,0,0,0.16); overflow: hidden; }
.inbox-untrusted-head { display: flex; align-items: center; gap: 6px; padding: 6px 8px; color: var(--waiting); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px dashed rgba(245,166,35,0.26); }
.inbox-untrusted pre { margin: 0; padding: 8px; max-height: 118px; overflow: auto; color: var(--text-mid); white-space: pre-wrap; overflow-wrap: anywhere; font: 11.5px/1.5 var(--mono); }
.inbox-route-line, .inbox-rule-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: var(--text-dim); font-size: 10.5px; }
.inbox-route-line span, .inbox-rule-line span { display: inline-flex; align-items: center; gap: 5px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.inbox-rule-line { color: var(--text-faint); }
.inbox-actions { display: flex; align-items: flex-start; justify-content: flex-end; gap: 6px; flex-wrap: wrap; min-width: 168px; }
.inbox-stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.inbox-stat-grid div { border: 1px solid var(--border); border-radius: 5px; background: var(--surface); padding: 12px; min-width: 0; }
.inbox-stat-grid span { display: block; color: var(--text); font-size: 22px; line-height: 1; }
.inbox-stat-grid p { margin: 6px 0 0; color: var(--text-dim); font-size: 11px; }
.inbox-rule-panel { overflow: visible; }
.inbox-rule-list { display: flex; flex-direction: column; gap: 7px; padding: 8px; }
.rule-card { border: 1px solid var(--border); border-radius: 5px; background: var(--surface); overflow: hidden; }
.rule-card[open] { border-color: var(--border-strong); }
.rule-card summary { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 7px; align-items: center; padding: 9px 10px; cursor: pointer; list-style: none; }
.rule-card summary::-webkit-details-marker { display: none; }
.rule-card summary > span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); font-size: 11px; }
.rule-mode, .rule-readonly { padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; color: var(--text-dim); background: var(--surface-2); font-size: 9.5px; }
.rule-readonly.on { color: var(--running); border-color: rgba(46,182,114,0.32); background: var(--running-dim); }
.rule-readonly.off { color: var(--waiting); border-color: rgba(245,166,35,0.32); background: var(--waiting-dim); }
.rule-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding: 10px; border-top: 1px solid var(--border); }
.rule-edit-grid label { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.rule-edit-grid label > span { font: 10px var(--mono); color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; }
.rule-edit-wide { grid-column: 1 / -1; }
.rule-check { grid-column: 1 / -1; flex-direction: row !important; align-items: center; color: var(--text-dim); font-size: 11.5px; }
.rule-check input { accent-color: var(--primary); }
@media (max-width: 980px) {
  .overview-grid, .monitor-layout, .monitor-strip, .inbox-layout { grid-template-columns: 1fr; }
  .inbox-toolbar { align-items: flex-start; flex-direction: column; }
  .inbox-search { margin-left: 0; width: 100%; grid-template-columns: 16px minmax(0, 1fr); }
  .inbox-item { grid-template-columns: 28px minmax(0, 1fr); }
  .inbox-actions { grid-column: 2; justify-content: flex-start; min-width: 0; }
}

/* ── Inbox conversation view (master–detail) ───────────── */
.inbox-split { display: flex; gap: 14px; align-items: stretch; height: calc(100vh - 252px); min-height: 440px; }
.inbox-conv-list { flex: 0 0 340px; width: 340px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 2px; }
.inbox-conv-detail { flex: 1 1 auto; min-width: 0; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); overflow: hidden; display: flex; flex-direction: column; }
.inbox-conv-rows { display: flex; flex-direction: column; gap: 6px; }
.inbox-conv { display: grid; grid-template-columns: 16px minmax(0, 1fr) auto; gap: 10px; align-items: center; width: 100%; text-align: left; padding: 10px 11px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; font: inherit; transition: border-color 0.12s, background 0.12s; }
.inbox-conv:hover { background: var(--surface-2); border-color: var(--border-strong); }
.inbox-conv.is-selected { border-color: var(--accent); background: var(--surface-2); box-shadow: inset 2px 0 0 var(--accent); }
.inbox-conv-rail { display: flex; align-items: center; justify-content: center; }
.inbox-conv-main { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.inbox-conv-top { display: flex; align-items: center; gap: 6px; min-width: 0; }
.inbox-conv-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); font-size: 13px; font-weight: 500; }
.inbox-conv.is-unread .inbox-conv-name { font-weight: 600; }
.inbox-conv-sub { display: flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 11px; min-width: 0; flex-wrap: wrap; }
.inbox-conv-dot { opacity: 0.5; }
.inbox-conv-project { padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface-2); color: var(--text-mid); font-size: 10px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.inbox-conv-project--link { cursor: pointer; }
.inbox-conv-project--link:hover { border-color: var(--accent); color: var(--text); }
.inbox-conv-badge { flex: 0 0 auto; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: var(--accent); color: #0a0a0d; font: 600 10px var(--mono); display: inline-flex; align-items: center; justify-content: center; }
.inbox-live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--running); box-shadow: 0 0 0 3px var(--running-dim); display: inline-block; }

/* detail pane */

.inbox-live-pill { display: inline-flex; align-items: center; gap: 5px; padding: 1px 7px; border-radius: 10px; background: var(--running-dim); color: var(--running); border: 1px solid rgba(46,182,114,0.35); font-size: 10px; }
.inbox-monitor-pill { display: inline-flex; align-items: center; gap: 4px; padding: 1px 7px; border-radius: 10px; background: rgba(94,234,212,0.10); color: var(--accent); border: 1px solid rgba(94,234,212,0.32); font-size: 10px; }

.inbox-thread { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.inbox-msg { border: 1px solid var(--border); border-radius: 7px; background: var(--surface); padding: 11px 13px; }

/* Scope the shared markdown renderer down to chat-bubble proportions. */
.inbox-msg-body .markdown-rendered { font-size: 13px; line-height: 1.55; color: var(--text); max-width: none; }

.inbox-msg-body .markdown-rendered h3 { font-size: 13px; margin: 12px 0 5px; padding-bottom: 0; border-bottom: none; }

.inbox-msg-body .markdown-rendered pre { margin: 8px 0; padding: 9px 11px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; overflow-x: auto; }
.inbox-msg-body .markdown-rendered pre code { padding: 0; background: none; font-size: 12px; }
.inbox-msg-body .markdown-rendered hr { margin: 10px 0; border: none; border-top: 1px solid var(--border); }

.inbox-back { display: none; }
@media (max-width: 860px) {

}

/* ── Tables ────────────────────────────────────────────── */
.table { width: 100%; border-collapse: collapse; font-size: 12px; }
.table thead th { text-align: left; padding: 8px 10px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 500; background: var(--bg); position: sticky; top: 0; z-index: 1; }
.table tbody td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text-mid); }
.table tbody tr:hover { background: var(--surface); }
.table tbody tr:hover .row-attach { opacity: 1; }
.row-attach { opacity: 0; transition: opacity 100ms; display: flex; justify-content: flex-end; gap: 5px; }

/* ── Session detail 3-pane ──────────────────────────────── */
.three-pane { display: grid; grid-template-columns: 1fr 1fr 320px; gap: 10px; height: calc(100vh - 44px - 90px); }
.bridge-layout { display: grid; grid-template-columns: minmax(480px, 1.15fr) minmax(360px, 0.85fr); gap: 10px; height: calc(100vh - 44px - 90px); min-height: 520px; }
.bridge-layout.single { grid-template-columns: minmax(0, 1fr); }
.completed-layout.single { grid-template-columns: minmax(0, 1fr); }
.completed-layout { display: grid; grid-template-columns: minmax(480px, 1.05fr) minmax(360px, 0.95fr); gap: 10px; height: calc(100vh - 44px - 90px); min-height: 520px; }
.completed-layout .pane { min-height: 0; }
.completed-layout .transcript { min-height: 100%; }
.bridge-layout .terminal-pane { min-width: 0; min-height: 0; height: 100%; }
.bridge-side { min-width: 0; min-height: 0; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
.bridge-poll { padding: 2px 7px; border: 1px solid var(--border); border-radius: 3px; color: var(--text-faint); font-size: 10px; }
.bridge-panel { border: 1px solid var(--border); border-radius: 4px; background: var(--surface); overflow: hidden; min-height: 0; display: flex; flex-direction: column; }
.bridge-panel.open { flex: 1; }
.bridge-panel.closed { flex: 0 0 auto; }
.bridge-panel-head { width: 100%; display: flex; align-items: center; gap: 7px; border: 0; border-bottom: 1px solid var(--border); background: var(--bg-2); color: var(--text-dim); padding: 8px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; text-align: left; }
.bridge-panel-head:hover { color: var(--text); background: var(--surface-2); }
.bridge-panel-count { margin-left: auto; font-size: 10.5px; color: var(--text-faint); letter-spacing: 0; text-transform: none; }
.bridge-panel-body { min-height: 0; overflow-y: auto; padding: 10px; }
.bridge-empty { height: 100%; min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-faint); font-size: 12px; }
.bridge-diff { display: flex; flex-direction: column; gap: 10px; }
.bridge-diff-meta { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 11px; overflow: hidden; }
.bridge-diff-meta span { display: inline-flex; align-items: center; gap: 5px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bridge-diff-file { border: 1px solid var(--border); border-radius: 3px; overflow: hidden; background: var(--bg); }
.bridge-diff-file-head { width: 100%; display: grid; grid-template-columns: 14px 16px minmax(0, 1fr) auto auto; align-items: center; gap: 8px; padding: 7px 9px; background: var(--surface-2); border: 0; border-bottom: 1px solid var(--border); color: var(--text-mid); font-size: 11.5px; text-align: left; cursor: pointer; }
.bridge-diff-file-head:hover { background: var(--surface-3); color: var(--text); }
.bridge-diff-file-head:focus-visible { outline: 1px solid var(--primary); outline-offset: -2px; }
.bridge-diff-file.closed .bridge-diff-file-head { border-bottom: 0; }
.bridge-diff-file-head .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.bridge-diff-file-head .add { color: var(--running); }
.bridge-diff-file-head .rem { color: var(--error); }
.bridge-hunk-head { padding: 5px 8px; color: var(--primary-hi); background: rgba(100,93,246,0.08); border-bottom: 1px solid var(--border); font-size: 10.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bridge-diff-line { display: grid; grid-template-columns: 42px minmax(0, 1fr); gap: 8px; min-height: 19px; padding: 1px 8px; font-family: var(--mono); font-size: 11px; line-height: 1.45; }
.bridge-diff-line .num { color: var(--text-faint); text-align: right; user-select: none; }
.bridge-diff-line .code { color: var(--text-mid); overflow: hidden; text-overflow: ellipsis; white-space: pre; }
.bridge-diff-line.add { background: rgba(46, 182, 114, 0.09); }
.bridge-diff-line.add .code { color: #8de0b4; }
.bridge-diff-line.add .code::before { content: '+'; color: var(--running); margin-right: 5px; }
.bridge-diff-line.rem { background: rgba(226, 87, 87, 0.09); }
.bridge-diff-line.rem .code { color: #f0a1a1; }
.bridge-diff-line.rem .code::before { content: '-'; color: var(--error); margin-right: 5px; }
.bridge-diff-line.ctx .code::before { content: ' '; margin-right: 5px; }
	.bridge-context { display: flex; flex-direction: column; gap: 10px; }
	.bridge-tool-row { display: grid; grid-template-columns: 74px minmax(0, 1fr); gap: 8px; padding: 4px 0; font-size: 11.5px; }
	.bridge-tool-row .tool { color: var(--primary-hi); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
	.bridge-tool-row .summary { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
	@media (max-width: 1180px) {
	  .hero, .hero.mc-landing { grid-template-columns: 1fr; }
	  .agent-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
	  .bridge-layout { grid-template-columns: 1fr; height: auto; }
	  .completed-layout { grid-template-columns: 1fr; height: auto; }
	  .bridge-layout .terminal-pane { min-height: 520px; }
	  .bridge-side { overflow: visible; }
	}
		@media (max-width: 820px) {
		  .main { padding: 16px 14px 48px; }
		  .hero-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
		  .heatmap.gh { width: 100%; box-sizing: border-box; }
		  .heatmap.gh .heatmap-head { min-width: 0; white-space: normal; }
		  .gh-grid { grid-template-columns: 34px minmax(0, 1fr); }
		  .gh-chart { width: auto; overflow-x: auto; }
		  .agent-grid { grid-template-columns: 1fr; }
